{% load i18n %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% trans "Register" %} - InvStock</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;}body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#0f172a 0%,#1e3a5f 50%,#0f172a 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.auth-card{background:white;border-radius:20px;padding:48px 40px;width:100%;max-width:420px;box-shadow:0 25px 60px rgba(0,0,0,0.3);}
.brand{text-align:center;margin-bottom:32px;}
.brand-icon{width:60px;height:60px;background:linear-gradient(135deg,#2563eb,#3b82f6);border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;font-size:26px;color:white;}
.brand h1{font-size:22px;font-weight:700;color:#0f172a;margin:0;}
.brand p{font-size:14px;color:#64748b;margin:4px 0 0;}
.form-group{margin-bottom:14px;}
.form-label{font-size:13px;font-weight:500;color:#374151;margin-bottom:6px;display:block;}
.form-input{width:100%;padding:11px 14px;border:1.5px solid #e5e7eb;border-radius:10px;font-size:14px;transition:all 0.2s;outline:none;font-family:inherit;}
.form-input:focus{border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,0.1);}
.btn-reg{width:100%;padding:13px;background:linear-gradient(135deg,#16a34a,#22c55e);color:white;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;transition:all 0.2s;margin-top:8px;}
.btn-reg:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(22,163,74,0.35);}
.link-btn{color:#2563eb;text-decoration:none;font-size:14px;font-weight:500;}
.link-btn:hover{text-decoration:underline;}
.alert-err{background:#fef2f2;border:1px solid #fecaca;color:#dc2626;padding:11px 14px;border-radius:9px;margin-bottom:16px;font-size:14px;}
.lang-bar{display:flex;gap:6px;justify-content:center;margin-bottom:24px;}
.lang-b{padding:5px 12px;border-radius:6px;border:1px solid #e5e7eb;background:transparent;font-size:12px;font-weight:500;cursor:pointer;color:#64748b;transition:all 0.2s;}
.lang-b.active,.lang-b:hover{background:#2563eb;color:white;border-color:#2563eb;}
</style>
</head>
<body>
<div class="auth-card">
    <div class="lang-bar">
        <form action="{% url 'set_language' %}" method="post" id="langForm3" style="display:none;">{% csrf_token %}<input type="hidden" name="next" value="{{ request.get_full_path }}"><input type="hidden" name="language" id="langInput3" value=""></form>
        <button type="button" class="lang-b {% if LANGUAGE_CODE == 'uz' %}active{% endif %}" onclick="setLang3('uz')">UZ</button>
        <button type="button" class="lang-b {% if LANGUAGE_CODE == 'ru' %}active{% endif %}" onclick="setLang3('ru')">RU</button>
        <button type="button" class="lang-b {% if LANGUAGE_CODE == 'en' %}active{% endif %}" onclick="setLang3('en')">EN</button>
    </div>
    <div class="brand">
        <div class="brand-icon"><i class="fas fa-user-plus"></i></div>
        <h1>{% trans "Create Account" %}</h1>
        <p>{% trans "Join InvStock today" %}</p>
    </div>
    {% for message in messages %}
    <div class="alert-err">{{ message }}</div>
    {% endfor %}
    <form method="post">
        {% csrf_token %}
        <div class="form-group"><label class="form-label">{% trans "Username" %}</label><input type="text" name="username" class="form-input" required></div>
        <div class="form-group"><label class="form-label">{% trans "Email" %}</label><input type="email" name="email" class="form-input"></div>
        <div class="form-group"><label class="form-label">{% trans "Password" %}</label><input type="password" name="password1" class="form-input" required></div>
        <div class="form-group"><label class="form-label">{% trans "Confirm Password" %}</label><input type="password" name="password2" class="form-input" required></div>
        <button type="submit" class="btn-reg">{% trans "Create Account" %}</button>
    </form>
    <div style="text-align:center;font-size:14px;color:#64748b;margin-top:20px;">
        {% trans "Already have an account?" %} <a href="{% url 'accounts:login' %}" class="link-btn">{% trans "Login" %}</a>
    </div>
</div>
<script>function setLang3(l){document.getElementById('langInput3').value=l;document.getElementById('langForm3').submit();}</script>
</body>
</html>
